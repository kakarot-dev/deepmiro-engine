apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mirofish.fullname" . }}-redis
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: redis
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image }}
        command: ["redis-server", "--appendonly", "yes"]
        ports:
        - containerPort: {{ .Values.redis.port }}
        resources:
          {{- toYaml .Values.redis.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mirofish.fullname" . }}-redis
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: redis
  ports:
  - port: {{ .Values.redis.port }}
