apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mirofish.fullname" . }}-secrets
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
type: Opaque
stringData:
  llm-api-key: {{ .Values.secrets.llmApiKey | default "" | quote }}
  surreal-password: {{ .Values.secrets.surrealPassword | default "changeme" | quote }}
  mcp-api-key: {{ .Values.secrets.mcpApiKey | default "" | quote }}
