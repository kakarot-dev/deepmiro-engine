apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mirofish.fullname" . }}-uploads
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.uploads.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mirofish.fullname" . }}-backend
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: backend
    spec:
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        ports:
        - containerPort: {{ .Values.backend.port }}
        env:
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: llm-api-key
        - name: LLM_BASE_URL
          value: {{ .Values.llm.baseUrl | quote }}
        - name: LLM_MODEL_NAME
          value: {{ .Values.llm.modelName | quote }}
        - name: NEO4J_URI
          value: "bolt://{{ include "mirofish.fullname" . }}-neo4j:{{ .Values.neo4j.boltPort }}"
        - name: NEO4J_USER
          value: neo4j
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: neo4j-password
        - name: FLASK_HOST
          value: "0.0.0.0"
        - name: FLASK_PORT
          value: {{ .Values.backend.port | quote }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        volumeMounts:
        - name: uploads
          mountPath: /app/backend/uploads
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 45
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 15
          periodSeconds: 10
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: {{ include "mirofish.fullname" . }}-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mirofish.fullname" . }}-backend
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: backend
  ports:
  - port: {{ .Values.backend.port }}
