apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mirofish.fullname" . }}-uploads
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.uploads.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mirofish.fullname" . }}-backend
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: backend
    spec:
      imagePullSecrets:
      - name: ghcr-creds
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        imagePullPolicy: {{ .Values.backend.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: {{ .Values.backend.port }}
        env:
        - name: GRAPH_BACKEND
          value: surrealdb
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: llm-api-key
        - name: LLM_BASE_URL
          value: {{ .Values.llm.baseUrl | quote }}
        - name: LLM_MODEL_NAME
          value: {{ .Values.llm.modelName | quote }}
        - name: LLM_BOOST_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: llm-api-key
        - name: LLM_BOOST_BASE_URL
          value: {{ .Values.llm.baseUrl | quote }}
        - name: LLM_BOOST_MODEL_NAME
          value: {{ .Values.llm.boostModelName | quote }}
        - name: SURREAL_URL
          value: "ws://{{ include "mirofish.fullname" . }}-surreal:8000"
        - name: SURREAL_NAMESPACE
          value: mirofish
        - name: SURREAL_DATABASE
          value: production
        - name: SURREAL_USER
          value: root
        - name: SURREAL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: surreal-password
        - name: EMBEDDING_PROVIDER
          value: openai
        - name: EMBEDDING_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: llm-api-key
        - name: EMBEDDING_BASE_URL
          value: {{ .Values.embedding.baseUrl | quote }}
        - name: EMBEDDING_MODEL
          value: {{ .Values.embedding.model | quote }}
        - name: EMBEDDING_DIMENSIONS
          value: {{ .Values.embedding.dimensions | quote }}
        - name: FLASK_HOST
          value: "0.0.0.0"
        - name: FLASK_PORT
          value: {{ .Values.backend.port | quote }}
        # Sim subprocesses use this URL to call the in-pod TWHIN-BERT
        # sidecar instead of loading the model into their own RSS.
        - name: TWHIN_URL
          value: "http://localhost:{{ .Values.twhinSidecar.port }}"
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        volumeMounts:
        - name: uploads
          mountPath: /app/deepmiro/engine/uploads
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 45
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 15
          periodSeconds: 10
      # ── TWHIN-BERT embedding sidecar ──
      # Loads Twitter/twhin-bert-base exactly once per pod and serves
      # the cached recommender. Same-pod containers share localhost,
      # so the backend (and its sim subprocesses) reach it via
      # http://localhost:7001 with no service / DNS hop.
      - name: twhin-sidecar
        image: {{ .Values.twhinSidecar.image }}
        imagePullPolicy: {{ .Values.twhinSidecar.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: {{ .Values.twhinSidecar.port }}
        env:
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          {{- toYaml .Values.twhinSidecar.resources | nindent 10 }}
        # Model load takes 5-15s on cold start, so the readiness probe
        # waits up to 60s before the sidecar is marked ready. Backend
        # sim subprocesses retry the embed call on connection refused
        # (see engine/scripts/twhin_rec.py startup retry loop), so a
        # delayed sidecar won't crash a sim — it'll fall back to the
        # "recent posts" recommender path until ready.
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.twhinSidecar.port }}
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.twhinSidecar.port }}
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: {{ include "mirofish.fullname" . }}-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mirofish.fullname" . }}-backend
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: backend
  ports:
  - port: {{ .Values.backend.port }}
