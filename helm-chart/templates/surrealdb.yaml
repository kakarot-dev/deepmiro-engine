apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mirofish.fullname" . }}-surreal
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.surrealdb.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mirofish.fullname" . }}-surreal
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
    component: surrealdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: surrealdb
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: surrealdb
    spec:
      containers:
      - name: surrealdb
        image: {{ .Values.surrealdb.image }}
        args:
          - start
          - --user
          - root
          - --pass
          - $(SURREAL_PASSWORD)
          - --bind
          - 0.0.0.0:8000
          - --log
          - warn
          - -A
          - surrealkv:/data/mirofish.db
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: SURREAL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: surreal-password
        resources:
          {{- toYaml .Values.surrealdb.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "mirofish.fullname" . }}-surreal
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mirofish.fullname" . }}-surreal
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: surrealdb
  ports:
  - name: http
    port: 8000
