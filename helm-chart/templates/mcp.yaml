apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mirofish.fullname" . }}-mcp
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
    component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: mcp
    spec:
      imagePullSecrets:
      - name: ghcr-creds
      containers:
      - name: mcp
        image: {{ .Values.mcp.image }}
        ports:
        - containerPort: {{ .Values.mcp.port }}
        env:
        - name: MIROFISH_URL
          value: "http://{{ include "mirofish.fullname" . }}-backend:{{ .Values.backend.port }}"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: llm-api-key
        - name: TRANSPORT
          value: http
        - name: HTTP_PORT
          value: {{ .Values.mcp.port | quote }}
        - name: MCP_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mirofish.fullname" . }}-secrets
              key: mcp-api-key
        resources:
          {{- toYaml .Values.mcp.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.mcp.port }}
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mirofish.fullname" . }}-mcp
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: mcp
  ports:
  - port: {{ .Values.mcp.port }}
