backend:
  image: ghcr.io/kakarot-dev/deepmiro-backend:latest
  imagePullPolicy: Always
  port: 5001
  resources:
    # Bumped from 4Gi → 8Gi after OOMKills during multi-platform sims.
    # v0.10.0 moves the TWHIN-BERT model into a sidecar container, so
    # the backend itself no longer carries 1.5 GB × N for concurrent
    # sims — but the per-agent OASIS state and the LLM clients still
    # need real headroom. 8Gi gives us room for 3-4 concurrent sims
    # without risking OOM.
    requests:
      memory: "4Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "3000m"

twhinSidecar:
  # Pod-scoped TWHIN-BERT embedding service. Loads the model exactly
  # once per pod regardless of how many sim subprocesses are running.
  # Listens on localhost:7001, only reachable from inside the pod.
  image: ghcr.io/kakarot-dev/deepmiro-twhin-sidecar:latest
  imagePullPolicy: Always
  port: 7001
  resources:
    # Memory is mostly the model weights (~1.5 GiB) + tokenizer cache
    # + headroom for batches. CPU only spikes during embed calls.
    requests:
      memory: "1500Mi"
      cpu: "200m"
    limits:
      memory: "2500Mi"
      cpu: "1000m"

mcp:
  image: ghcr.io/kakarot-dev/deepmiro-mcp:latest
  port: 3001
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

surrealdb:
  image: surrealdb/surrealdb:latest
  port: 8000
  storage: 20Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# Set hosted.enabled=true when using deepmiro-hosted overlay (auth, billing, edge)
# When enabled, /api traffic routes through the hosted pod instead of directly to backend
hosted:
  enabled: false

ingress:
  enabled: true
  host: deepmiro.org
  className: traefik

llm:
  baseUrl: "https://api.fireworks.ai/inference/v1"
  modelName: "accounts/fireworks/models/minimax-m2p5"
  boostModelName: "accounts/fireworks/models/gpt-oss-120b"

embedding:
  baseUrl: "https://api.fireworks.ai/inference"
  model: "nomic-ai/nomic-embed-text-v1.5"
  dimensions: 768

uploads:
  storage: 20Gi
