services:
  neo4j:
    image: neo4j:5.15-community
    container_name: mirofish-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 3G
      NEO4J_dbms_memory_pagecache_size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: mirofish-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  mirofish-backend:
    build:
      context: ../MiroFish
      dockerfile: Dockerfile
    container_name: mirofish-backend
    environment:
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.fireworks.ai/inference/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-accounts/fireworks/models/qwen3-8b}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5001"
    ports:
      - "5001:5001"
    volumes:
      - uploads:/app/backend/uploads
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  mirofish-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mirofish-mcp
    environment:
      MIROFISH_URL: http://mirofish-backend:5001
      LLM_API_KEY: ${LLM_API_KEY}
      TRANSPORT: http
      HTTP_PORT: "3001"
      MCP_API_KEY: ${MCP_API_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      - mirofish-backend
    restart: unless-stopped

volumes:
  neo4j-data:
  redis-data:
  uploads:
