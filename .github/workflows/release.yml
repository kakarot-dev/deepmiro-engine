name: Release

on:
  push:
    tags: ["v*"]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "engine=false" >> "$GITHUB_OUTPUT"
          echo "mcp=false" >> "$GITHUB_OUTPUT"
          if echo "$CHANGED" | grep -qE '^(engine/|docker/Dockerfile\.backend)'; then
            echo "engine=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^(mcp-server/|docker/Dockerfile$)'; then
            echo "mcp=true" >> "$GITHUB_OUTPUT"
          fi
          # If nothing matched (e.g. shared files, helm, etc.), rebuild both
          if ! echo "$CHANGED" | grep -qE '^(engine/|mcp-server/|docker/)'; then
            echo "engine=true" >> "$GITHUB_OUTPUT"
            echo "mcp=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: engine
            file: docker/Dockerfile.backend
            image: deepmiro-backend
            changed: ${{ needs.changes.outputs.engine }}
          - name: mcp
            file: docker/Dockerfile
            image: deepmiro-mcp
            changed: ${{ needs.changes.outputs.mcp }}
    steps:
      - if: matrix.changed == 'true'
        uses: actions/checkout@v4
      - if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3
      - if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.ref_name }}

  publish-mcp-registry:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc
      - name: Publish to MCP registry
        run: mcp-publisher publish
