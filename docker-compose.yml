###############################################################################
# DeepMiro — root docker-compose.yml
#
# Single-file deployment for the DeepMiro swarm simulation engine. Works
# both with local `docker compose up` AND as a one-click deployment on
# Railway (Railway auto-detects docker-compose.yml at the repo root).
#
# Services:
#   surrealdb      — graph + vector + document store
#   twhin-sidecar  — pod-scoped TWHIN-BERT embedding service (v0.10+)
#   backend        — Flask engine that runs OASIS simulations
#   mcp            — MCP server (optional; only needed if you want Claude
#                    Code / Claude Desktop / Cursor / etc. to reach the
#                    backend through Model Context Protocol)
#
# Quick start (local):
#   cp .env.example .env
#   # edit .env and fill in LLM_API_KEY at minimum
#   docker compose up -d
#
# Railway:
#   Import this repo; Railway picks up docker-compose.yml automatically.
#   Railway does NOT read .env files — set each variable in the Railway
#   dashboard (Variables tab) and Railway injects them at container
#   start. The defaults in this file cover inter-service URLs so you
#   only need to set the LLM_* secrets.
###############################################################################

services:
  # ──────────────────────────────────────────────────────────────────
  # SurrealDB — persistent graph + vector + document store
  # ──────────────────────────────────────────────────────────────────
  surrealdb:
    image: surrealdb/surrealdb:latest
    # SurrealDB 3.x reads all start-time config from environment
    # variables natively (clap-bound env attrs) — no command-line
    # flags or shell expansion needed. This is the only layout that
    # works identically on local `docker compose up` AND on Railway,
    # because Railway imports the compose file but does NOT do
    # compose-level ${VAR} interpolation, and the surrealdb image
    # is distroless so shell expansion isn't an option either.
    #
    # The list form below tells compose: for entries with `=`, use
    # the literal value; for entries without, pass through from the
    # calling environment (local: .env file auto-loaded by compose,
    # Railway: service variables set in the dashboard).
    environment:
      # Default root user; override by setting SURREAL_USER in your
      # .env or Railway service variables if you need a different one.
      - SURREAL_USER=root
      - SURREAL_BIND=0.0.0.0:8000
      - SURREAL_PATH=surrealkv:/data/deepmiro.db
      - SURREAL_LOG=warn
      # Required. No default on purpose — prevents silent root-password
      # shipping. Local compose: set in .env. Railway: set in the
      # surrealdb service's Variables tab.
      - SURREAL_PASS
    command: start
    # No ports: block by default. The backend reaches SurrealDB via
    # the internal service name `surrealdb`, so there's no need to
    # publish port 8000 on the host — and publishing it would
    # expose a root-privileged DB on the public IP of any VPS that
    # runs `docker compose up`. For local dev where you want to
    # query the DB from your host, uncomment the ports: block:
    # ports:
    #   - "${SURREAL_PORT:-8000}:8000"
    expose:
      - "8000"
    volumes:
      - surreal-data:/data
    restart: unless-stopped
    # No healthcheck: the surrealdb/surrealdb:latest image is
    # distroless and ships neither curl nor wget, and the
    # `surreal is-ready` subcommand requires --endpoint on recent
    # versions. The backend has its own retry loop against
    # SURREAL_URL, so a missing healthcheck just means depends_on
    # won't block boot — backend retries until the DB answers.

  # ──────────────────────────────────────────────────────────────────
  # TWHIN-BERT sidecar — pod-scoped embedding service
  #
  # Loads Twitter/twhin-bert-base exactly once for the whole deployment
  # and serves embeddings to the sim subprocesses over HTTP. Without
  # this, every sim subprocess would load its own 1.5 GB copy of the
  # model and OOM the box. Not exposed to the outside world.
  # ──────────────────────────────────────────────────────────────────
  twhin-sidecar:
    image: ghcr.io/kakarot-dev/deepmiro-twhin-sidecar:latest
    # Alternative: build from source
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile.twhin-sidecar
    expose:
      - "7001"
    restart: unless-stopped
    mem_limit: 2500m
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          python -c "import urllib.request; urllib.request.urlopen('http://localhost:7001/healthz', timeout=2)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # model load + first-run HF cache resolve

  # ──────────────────────────────────────────────────────────────────
  # Backend — Flask engine that runs the actual simulations
  # ──────────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/kakarot-dev/deepmiro-backend:latest
    # Alternative: build from source
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile.backend
    # List-form environment. Entries with `=` are static (shipped with
    # every deployment). Entries without `=` are passthrough from the
    # calling env — local compose reads them from .env, Railway reads
    # them from the service's Variables tab. No `${VAR}` interpolation
    # anywhere because Railway doesn't honor it.
    environment:
      # ── Storage backend (static — never changes) ──
      - GRAPH_BACKEND=surrealdb
      - SURREAL_URL=ws://surrealdb:8000
      - SURREAL_NAMESPACE=mirofish
      - SURREAL_DATABASE=production
      - SURREAL_USER=root

      # ── LLM defaults: Fireworks production stack ──
      - LLM_BASE_URL=https://api.fireworks.ai/inference/v1
      - LLM_MODEL_NAME=accounts/fireworks/models/minimax-m2p5
      - LLM_BOOST_BASE_URL=https://api.fireworks.ai/inference/v1
      - LLM_BOOST_MODEL_NAME=accounts/fireworks/models/gpt-oss-120b
      - EMBEDDING_PROVIDER=openai
      - EMBEDDING_BASE_URL=https://api.fireworks.ai/inference
      - EMBEDDING_MODEL=nomic-ai/nomic-embed-text-v1.5
      - EMBEDDING_DIMENSIONS=768

      # ── TWHIN-BERT sidecar (internal) ──
      - TWHIN_URL=http://twhin-sidecar:7001

      # ── Flask server (internal) ──
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5001

      # ── User-provided secrets (required) ──
      # Set these in your .env (local) or service Variables tab
      # (Railway). LLM_API_KEY is also used as the default for
      # LLM_BOOST_API_KEY and EMBEDDING_API_KEY by the backend code
      # when those are unset — you only need one key if you stay
      # on Fireworks.
      - LLM_API_KEY
      - SURREAL_PASS

      # ── User-provided overrides (optional) ──
      # Override the Fireworks defaults above by setting these on
      # your local .env or Railway Variables tab.
      - LLM_BOOST_API_KEY
      - EMBEDDING_API_KEY
    # The backend serves BOTH the REST API (/api/*) AND the Vue web UI
    # (/, static assets). The UI bundle is built into the Docker image
    # via docker/Dockerfile.backend's multi-stage build.
    #
    # Self-hosters hit the UI at http://localhost:5001/ after
    # `docker compose up`. Set DEEPMIRO_API_KEY in .env to require
    # an API key on mutating routes + the SSE event stream.
    expose:
      - "5001"
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    environment:
      - DEEPMIRO_API_KEY
      - DEEPMIRO_WATCHDOG_STALE_SECONDS
    volumes:
      - uploads:/app/deepmiro/engine/uploads
    depends_on:
      # SurrealDB has no healthcheck (distroless image, no curl/wget)
      # so we can't gate on service_healthy. Backend retries the DB
      # connection at startup via its own reconnect loop.
      surrealdb:
        condition: service_started
      twhin-sidecar:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 8g
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          python -c "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=2)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ──────────────────────────────────────────────────────────────────
  # MCP server — THE PUBLIC ENTRY POINT
  #
  # Exposes the backend as a Model Context Protocol server so AI
  # clients (Claude Desktop, Cursor, VS Code Copilot, etc.) can call
  # create_simulation / get_report / interview_agent directly.
  #
  # On a Railway deployment, this is the port you want Railway to
  # proxy with TLS — NOT the backend's port 5001. The backend is
  # reachable internally via the `backend` service name and is
  # intentionally not published on the host (see the `expose:`
  # block on the backend service above).
  #
  # To disable MCP entirely and use only the REST API, delete this
  # whole service block and uncomment the `ports:` block on the
  # backend service above.
  # ──────────────────────────────────────────────────────────────────
  mcp:
    image: ghcr.io/kakarot-dev/deepmiro-mcp:latest
    # Alternative: build from source
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    environment:
      MIROFISH_URL: http://backend:5001
      TRANSPORT: http
      HTTP_PORT: "3001"
      # Optional: set MCP_API_KEY to require clients to authenticate
      MCP_API_KEY: ${MCP_API_KEY:-}
    ports:
      - "${MCP_PORT:-3001}:3001"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  surreal-data:
  uploads:
